name: Deploy Backend API to Somee

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend-dotnet/**"
      - "web-admin-panel/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web-admin-panel/package-lock.json'

      - name: Install Web Admin Dependencies
        run: |
          cd web-admin-panel
          npm ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API Project
        env:
          NEXT_PUBLIC_BASE_PATH: /admin
        run: dotnet publish backend-dotnet/DindoriPranitAPI/DindoriPranitAPI.csproj -c Release -o ./backend-dotnet/publish_out

      - name: Deploy via FTP to Somee
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.somee.com
          username: ${{ secrets.SOMEE_FTP_USERNAME }}
          password: ${{ secrets.SOMEE_FTP_PASSWORD }}
          local-dir: ./backend-dotnet/publish_out/
          server-dir: /
